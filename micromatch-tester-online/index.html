<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="./assets/favicon-DPzw7_dm.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Micromatch Tester</title>
    <script type="module" crossorigin src="./assets/index-BNg0Nu75.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-RC_B-8QY.css">
  </head>
  <body>
    <div class="container">
      <h1>Micromatch Tester</h1>
      <p class="subtitle">
        Test glob patterns against inputs using
        <a href="https://github.com/micromatch/micromatch" target="_blank">micromatch</a>
      </p>
      <div class="form">
        <div class="field">
          <label for="input">Input</label>
          <input
            type="text"
            id="input"
            placeholder="e.g. src/components/Button.tsx"
            autocomplete="off"
            spellcheck="false"
          />
        </div>
        <div class="field">
          <label for="pattern">Pattern</label>
          <input
            type="text"
            id="pattern"
            placeholder="e.g. **/*.tsx"
            autocomplete="off"
            spellcheck="false"
          />
        </div>
      </div>
      <div class="result" id="result" aria-live="polite">
        <span class="result-placeholder">Enter an input and a pattern …</span>
      </div>
    </div>
    <footer class="footer">
      <a href="https://github.com/adi-f/micromatch-tester-online" target="_blank">github.com/adi-f/micromatch-tester-online</a>
    </footer>
    <script>
      // Minimal process shim for micromatch/picomatch in browser dev mode.
      window.process = window.process || {
        env: {},
        platform: "browser",
        cwd: function () {
          return "/";
        },
      };
    </script>
  </body>
</html>
